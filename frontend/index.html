<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CostWatch — AWS Cost Dashboard</title>

  <!-- Google Fonts: Space Mono (headings/numbers) + DM Sans (body/labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Theme stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header__left">
      <span class="header__logo" aria-label="CostWatch logo">⬡ CostWatch</span>
      <span class="header__live" aria-label="Live indicator">
        <span class="header__live-dot"></span>
        Live
      </span>
    </div>

    <div class="header__right">
      <span class="header__synced" id="lastSynced">Last synced: —</span>

      <!-- USD / BRL pill toggle -->
      <div class="currency-toggle" role="radiogroup" aria-label="Currency selector">
        <button class="currency-toggle__btn currency-toggle__btn--active" data-currency="USD" aria-checked="true" role="radio">USD</button>
        <button class="currency-toggle__btn" data-currency="BRL" aria-checked="false" role="radio">BRL</button>
      </div>
    </div>
  </header>

  <main class="dashboard">

    <!-- ===== KPI CARDS ===== -->
    <section class="kpi-grid" aria-label="Key performance indicators">

      <!-- Today's Cost -->
      <article class="kpi-card" data-kpi="today" style="animation-delay: 0ms">
        <p class="kpi-card__label">Today's Cost</p>
        <p class="kpi-card__value" id="kpiToday">$0.00</p>
        <div class="kpi-card__footer">
          <svg class="kpi-card__sparkline" id="sparklineToday" width="60" height="24" viewBox="0 0 60 24" aria-hidden="true">
            <polyline points="" fill="none" stroke="currentColor" stroke-width="1.5" />
          </svg>
          <span class="kpi-card__delta" id="deltaToday">—</span>
        </div>
      </article>

      <!-- Month-to-Date -->
      <article class="kpi-card" data-kpi="mtd" style="animation-delay: 80ms">
        <p class="kpi-card__label">Month-to-Date</p>
        <p class="kpi-card__value" id="kpiMtd">$0.00</p>
        <div class="kpi-card__footer">
          <svg class="kpi-card__sparkline" id="sparklineMtd" width="60" height="24" viewBox="0 0 60 24" aria-hidden="true">
            <polyline points="" fill="none" stroke="currentColor" stroke-width="1.5" />
          </svg>
          <span class="kpi-card__delta" id="deltaMtd">—</span>
        </div>
      </article>

      <!-- Previous Month -->
      <article class="kpi-card" data-kpi="prev" style="animation-delay: 160ms">
        <p class="kpi-card__label">Previous Month</p>
        <p class="kpi-card__value" id="kpiPrev">$0.00</p>
        <div class="kpi-card__footer">
          <svg class="kpi-card__sparkline" id="sparklinePrev" width="60" height="24" viewBox="0 0 60 24" aria-hidden="true">
            <polyline points="" fill="none" stroke="currentColor" stroke-width="1.5" />
          </svg>
          <span class="kpi-card__delta" id="deltaPrev">—</span>
        </div>
      </article>

      <!-- Forecast -->
      <article class="kpi-card" data-kpi="forecast" style="animation-delay: 240ms">
        <p class="kpi-card__label">Forecast</p>
        <p class="kpi-card__value" id="kpiForecast">$0.00</p>
        <div class="kpi-card__footer">
          <svg class="kpi-card__sparkline" id="sparklineForecast" width="60" height="24" viewBox="0 0 60 24" aria-hidden="true">
            <polyline points="" fill="none" stroke="currentColor" stroke-width="1.5" />
          </svg>
          <span class="kpi-card__delta" id="deltaForecast">—</span>
        </div>
      </article>
    </section>

    <!-- ===== TREND CHART ===== -->
    <section class="panel trend-panel" aria-label="Cost trend chart">
      <div class="panel__header">
        <h2 class="panel__title">Cost Trend</h2>
        <div class="trend-tabs" role="tablist" aria-label="Trend granularity">
          <button class="trend-tabs__btn trend-tabs__btn--active" role="tab" aria-selected="true" data-granularity="DAILY">Daily</button>
          <button class="trend-tabs__btn" role="tab" aria-selected="false" data-granularity="WEEKLY">Weekly</button>
          <button class="trend-tabs__btn" role="tab" aria-selected="false" data-granularity="MONTHLY">Monthly</button>
        </div>
      </div>
      <div class="trend-chart-wrapper">
        <canvas id="trendChart" aria-label="Cost trend line chart"></canvas>
      </div>
    </section>

    <!-- ===== MIDDLE ROW: Services Bar + Account Donut ===== -->
    <div class="charts-row">

      <!-- Top Services Horizontal Bar Chart -->
      <section class="panel services-panel" aria-label="Top services by cost">
        <div class="panel__header">
          <h2 class="panel__title">Top 10 Services</h2>
        </div>
        <div class="services-chart-wrapper">
          <canvas id="servicesChart" aria-label="Top services horizontal bar chart"></canvas>
        </div>
      </section>

      <!-- Account Breakdown Donut Chart -->
      <section class="panel donut-panel" aria-label="Account breakdown">
        <div class="panel__header">
          <h2 class="panel__title">Account Breakdown</h2>
        </div>
        <div class="donut-chart-wrapper">
          <canvas id="accountDonut" aria-label="Account breakdown donut chart"></canvas>
        </div>
      </section>

    </div>

    <!-- ===== SERVICE HEATMAP ===== -->
    <section class="panel heatmap-panel" aria-label="Service cost heatmap">
      <div class="panel__header">
        <h2 class="panel__title">Service Heatmap</h2>
      </div>
      <div class="heatmap-grid" id="heatmapGrid" role="grid" aria-label="Service cost heatmap grid">
      </div>
    </section>

    <!-- ===== ACCOUNT COSTS TABLE ===== -->
    <section class="panel" aria-label="Cost per account">
      <div class="panel__header">
        <h2 class="panel__title">Cost per Account</h2>
      </div>
      <div class="table-wrapper">
        <table class="team-table" id="accountTable">
          <thead>
            <tr>
              <th class="team-table__th">Account</th>
              <th class="team-table__th">ID</th>
              <th class="team-table__th">Cost</th>
              <th class="team-table__th">% of Total</th>
            </tr>
          </thead>
          <tbody id="accountTableBody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- Chart.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- Application logic -->
  <script src="app.js"></script>
</body>
</html>
